<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiang | 摄影作品</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            overflow-x: hidden;
        }
        
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            transition: background 0.3s;
        }
        
        nav.scrolled {
            background: rgba(10,10,10,0.95);
        }
        
        nav .logo {
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
        }
        
        nav .menu {
            display: flex;
            gap: 3rem;
        }
        
        nav .menu a {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        nav .menu a:hover, nav .menu a.active {
            color: #fff;
        }
        
        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            background: #0a0a0a;
        }
        
        .hero h1 {
            font-size: 6rem;
            font-weight: 200;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            margin-left: 0.8em;
            opacity: 0;
            animation: fadeUp 1.2s ease forwards;
        }
        
        .hero p {
            font-size: 0.85rem;
            font-weight: 300;
            letter-spacing: 0.4em;
            color: rgba(255,255,255,0.5);
            margin-top: 1.5rem;
            opacity: 0;
            animation: fadeUp 1.2s ease 0.3s forwards;
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.3);
            animation: bounce 2.5s infinite;
        }
        
        /* Section */
        .section {
            padding: 8rem 4rem;
        }
        
        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }
        
        .section-header h2 {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
        }
        
        .section-header p {
            font-size: 2.5rem;
            font-weight: 200;
            margin-top: 1rem;
            color: rgba(255,255,255,0.9);
        }
        
        /* Category Grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }
        
        .category-grid .item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4/5;
        }
        
        .category-grid .item.wide {
            grid-column: span 2;
            aspect-ratio: 16/9;
        }
        
        .category-grid .item.tall {
            grid-row: span 2;
            aspect-ratio: auto;
        }
        
        .category-grid .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s ease;
        }
        
        .category-grid .item:hover img {
            transform: scale(1.05);
        }
        
        .category-grid .item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .category-grid .item:hover::after {
            opacity: 1;
        }
        
        /* About Section */
        .about {
            padding: 12rem 4rem;
            text-align: center;
            background: #0a0a0a;
        }
        
        .about h2 {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 3rem;
        }
        
        .about p {
            font-size: 1.8rem;
            font-weight: 200;
            line-height: 2;
            max-width: 600px;
            margin: 0 auto;
            color: rgba(255,255,255,0.85);
        }
        
        /* Contact */
        .contact {
            padding: 8rem 4rem;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .contact h2 {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 2rem;
        }
        
        .contact a {
            font-size: 1rem;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }
        
        .contact a:hover {
            color: #fff;
        }
        
        /* Footer */
        footer {
            padding: 3rem;
            text-align: center;
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .lightbox.active { display: flex; }
        
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 3rem;
            font-size: 3rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        
        .lightbox-close:hover { opacity: 1; }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 4rem;
            color: #fff;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.3s;
            padding: 2rem;
        }
        
        .lightbox-nav:hover { opacity: 1; }
        .lightbox-prev { left: 1rem; }
        .lightbox-next { right: 1rem; }
        
        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(15px); }
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .category-grid { grid-template-columns: repeat(2, 1fr); }
            .category-grid .item.wide { grid-column: span 1; aspect-ratio: 4/5; }
            nav { padding: 1.5rem 2rem; }
            .section { padding: 5rem 2rem; }
        }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem; letter-spacing: 0.4em; margin-left: 0.4em; }
            .category-grid { grid-template-columns: 1fr; }
            .category-grid .item, .category-grid .item.wide, .category-grid .item.tall { 
                grid-column: span 1; grid-row: span 1; aspect-ratio: 4/3; }
            nav .menu { display: none; }
        }
    </style>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        let currentIndex = 0;
        let images = [];
        
        // Collect all images
        document.querySelectorAll('.category-grid img').forEach((img, i) => {
            images.push(img.src);
            img.closest('.item').onclick = () => openLightbox(i);

        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = images[currentIndex];
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        function showImage(index) {
            currentIndex = (index + images.length) % images.length;
            lightboxImg.src = images[currentIndex];
        }
        
        function prevImage() { showImage(currentIndex - 1); }
        function nextImage() { showImage(currentIndex + 1); }
        
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        });
        
        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };
        
        // Nav scroll effect
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('nav');
            if (window.scrollY > 100) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
        
        // Smooth scroll
        document.querySelectorAll('nav .menu a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.querySelector(link.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
