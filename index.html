        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 5rem; font-weight: 200; letter-spacing: 0.5em; text-transform: uppercase; margin-bottom: 1rem; opacity: 0; animation: fadeIn 1.5s ease forwards; }

        .gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px; padding: 3px; }

        .gallery-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .gallery-item:hover img { transform: scale(1.08); }
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 1000; justify-content: center; align-items: center; }
        .lightbox.active { display: flex; }
        .lightbox img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .lightbox-close { position: absolute; top: 2rem; right: 3rem; font-size: 3rem; color: #fff; cursor: pointer; opacity: 0.5; transition: opacity 0.3s; }
        .lightbox-close:hover { opacity: 1; }
        .lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); font-size: 4rem; color: #fff; cursor: pointer; opacity: 0.4; transition: opacity 0.3s; padding: 2rem; }
        .lightbox-nav:hover { opacity: 1; }
        .lightbox-prev { left: 1rem; }
        .lightbox-next { right: 1rem; }
        .about { padding: 10rem 2rem; text-align: center; background: #000; }
        .about h2 { font-size: 0.7rem; font-weight: 400; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 4rem; }

        footer { padding: 5rem 2rem; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }

        footer a:hover { color: #fff; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(15px); } }
        @media (max-width: 900px) { .gallery { grid-template-columns: repeat(2, 1fr); } .hero h1 { font-size: 3rem; letter-spacing: 0.3em; } }

        <span class="lightbox-nav lightbox-prev" onclick="prevImage()">‹</span>
        <span class="lightbox-nav lightbox-next" onclick="nextImage()">›</span>
        <img src="" alt="" id="lightbox-img">
    </div>
    
    <script>
        let currentIndex = 0;
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const images = document.querySelectorAll('.gallery-item img');
        
        images.forEach((img, index) => {
            img.closest('.gallery-item').onclick = () => openLightbox(index);
        });
        
        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = images[currentIndex].src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        function showImage(index) {
            currentIndex = (index + images.length) % images.length;
            lightboxImg.src = images[currentIndex].src;
        }
        
        function prevImage() { showImage(currentIndex - 1); }
        function nextImage() { showImage(currentIndex + 1); }
        
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        });
        
        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };
    </script>
