<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jiang | 摄影作品</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #FAF6ED;
            color: #333;
        }
        
        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            transition: background 0.3s;
        }
        
        nav.scrolled { background: rgba(253,251,247,0.95); }
        
        nav .logo {
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }
        
        nav .menu {
            display: flex;
            gap: 2.5rem;
        }
        
        nav .menu a {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        nav .menu a:hover { color: #fff; }
        
        /* Hero - With Background Image */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .hero-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        
        .hero-bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.5);
        }
        
        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }
        
        .hero-content::before,
        .hero-content::after {
            content: '';
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 50px;
            background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.5), transparent);
        }
        
        .hero-content::before { top: -70px; }
        .hero-content::after { bottom: -70px; }
        
        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 200;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #fff;
            margin-left: 0.4em;
        }
        
        .hero-subtitle {
            margin-top: 2.5rem;
            font-size: 0.7rem;
            font-weight: 300;
            letter-spacing: 0.35em;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }
        
        .hero-subtitle span {
            position: relative;
        }
        
        .hero-subtitle span:not(:last-child)::after {
            content: '·';
            position: absolute;
            right: -1.1em;
            color: rgba(255,255,255,0.5);
        }
        
        .scroll-hint {
            position: absolute;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            font-size: 0.55rem;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.5);
        }
        
        /* Section */
        .section {
            padding: 5rem 6rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            background: #FAF6ED;
        }
        
        .section:last-of-type { border-bottom: none; }
        
        .section-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: baseline;
            gap: 1.2rem;
        }
        
        .section-header h2 {
            font-size: 0.55rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #bbb;
        }
        
        .section-header p {
            font-size: 1.5rem;
            font-weight: 300;
            color: #333;
        }
        
        /* Grid - 4 columns, 3 rows */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        
        .photo-grid .item {
            position: relative;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 4/3;
            background: #E8E3D9;
        }
        
        .photo-grid .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .photo-grid .item:hover img { transform: scale(1.04); }
        
        /* About */
        .about {
            padding: 7rem 6rem;
            text-align: center;
            background: #F5F0E5;
        }
        
        .about h2 {
            font-size: 0.55rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #bbb;
            margin-bottom: 2rem;
        }
        
        .about p {
            font-size: 1.2rem;
            font-weight: 300;
            line-height: 2;
            color: #888;
        }
        
        /* Footer */
        footer {
            padding: 3rem 6rem;
            text-align: center;
            font-size: 0.6rem;
            letter-spacing: 0.1em;
            color: #bbb;
            background: #FAF6ED;
            border-top: 1px solid rgba(0,0,0,0.04);
        }
        
        footer a {
            color: #bbb;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        footer a:hover { color: #666; }
        
        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(253,251,247,0.97);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .lightbox.active { display: flex; }
        
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 3rem;
            font-size: 2rem;
            color: #666;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        
        .lightbox-close:hover { opacity: 1; }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
            color: #666;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.3s;
            padding: 2rem;
        }
        
        .lightbox-nav:hover { opacity: 1; }
        .lightbox-prev { left: 1rem; }
        .lightbox-next { right: 1rem; }
        
        @media (max-width: 1100px) {
            .photo-grid { grid-template-columns: repeat(3, 1fr); }
        }
        
        @media (max-width: 800px) {
            .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            nav { padding: 1.5rem 2rem; }
            .section { padding: 3.5rem 2rem; }
            .hero h1 { font-size: 2.5rem; }
        }
        
        @media (max-width: 500px) {
            nav .menu { display: none; }
            .section { padding: 2.5rem 1.5rem; }
            .about { padding: 5rem 1.5rem; }
            .section-header { flex-direction: column; gap: 0.3rem; }
        }
    </style>
</head>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" onclick="closeLightbox()">×</span>
        <span class="lightbox-nav lightbox-prev" onclick="prevImage()">‹</span>
        <span class="lightbox-nav lightbox-next" onclick="nextImage()">›</span>
        <img src="" alt="" id="lightbox-img">
    </div>
    
    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        let currentIndex = 0;
        let images = [];
        
        document.querySelectorAll('.photo-grid img').forEach((img, i) => {
            images.push(img.src);
            img.closest('.item').onclick = () => openLightbox(i);
        });
        
        function openLightbox(index) {
            currentIndex = index;
            lightboxImg.src = images[currentIndex];
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        }
        
        function showImage(index) {
            currentIndex = (index + images.length) % images.length;
            lightboxImg.src = images[currentIndex];
        }
        
        function prevImage() { showImage(currentIndex - 1); }
        function nextImage() { showImage(currentIndex + 1); }
        
        document.addEventListener('keydown', (e) => {
            if (!lightbox.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'ArrowRight') nextImage();
        });
        
        lightbox.onclick = (e) => { if (e.target === lightbox) closeLightbox(); };
        
        document.querySelectorAll('nav .menu a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.querySelector(link.getAttribute('href'));
                if (target) target.scrollIntoView({ behavior: 'smooth' });
            });
        });
        
        window.addEventListener('scroll', () => {
            document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 100);
        });
    </script>
